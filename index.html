<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokequiz</title>
  <style>
    @font-face {
      font-family: 'Tamago';
      src: url('tamago.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Tamago', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #game {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #title {
      font-size: 20px;
      text-align: center;
      line-height: 1.6;
      width: 100%;
    }

    #sprite-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 220px;
    }

    #sprite-display {
      background-image: url('1.png');
      background-repeat: no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #main-btn {
      background: #fff;
      color: #000;
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 20px;
      font-family: 'Tamago', monospace;
      border: none;
      cursor: pointer;
      min-height: 60px;
    }

    #main-btn:hover:not(:disabled) {
      background: #ddd;
    }

    #main-btn:disabled {
      cursor: default;
    }

    #choices {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }

    .choice {
      flex: 1;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 9px;
      padding: 6px 6px;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1.6;
      min-height: 40px;
    }

    .choice:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .choice:disabled {
      cursor: default;
    }

    .choice.correct {
      border: 2px solid #15d000 !important;
      color: #15d000 !important;
    }

    .choice.wrong {
      border: 2px solid #ff3333 !important;
      color: #ff3333 !important;
    }

    .choice.dim {
      opacity: 0.3;
    }

    #score-text {
      font-size: 14px;
      text-align: center;
      width: 100%;
    }

    /* End screen */
    #end-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    #end-screen h2 {
      font-size: 20px;
      line-height: 1.8;
    }

    #end-screen .total-score {
      font-size: 32px;
    }

    #end-screen .sub-score {
      font-size: 13px;
      opacity: 0.7;
    }

    #end-screen #main-btn {
      width: auto;
      padding: 16px 32px;
    }
  </style>
</head>
<body>
  <div id="game">
    <h1 id="title">Who's that pokemon?</h1>
    <div id="sprite-container">
      <div id="sprite-display"></div>
    </div>
    <button id="main-btn" disabled>...</button>
    <div id="choices">
      <button class="choice" data-id="0">-</button>
      <button class="choice" data-id="0">-</button>
      <button class="choice" data-id="0">-</button>
    </div>
    <p id="score-text">Score: 100p</p>
  </div>

  <script>
    const POKEMON = [
      'Bulbasaur','Ivysaur','Venusaur','Charmander','Charmeleon','Charizard',
      'Squirtle','Wartortle','Blastoise','Caterpie','Metapod','Butterfree',
      'Weedle','Kakuna','Beedrill','Pidgey','Pidgeotto','Pidgeot',
      'Rattata','Raticate','Spearow','Fearow','Ekans','Arbok',
      'Pikachu','Raichu','Sandshrew','Sandslash','Nidoran F','Nidorina',
      'Nidoqueen','Nidoran M','Nidorino','Nidoking','Clefairy','Clefable',
      'Vulpix','Ninetales','Jigglypuff','Wigglytuff','Zubat','Golbat',
      'Oddish','Gloom','Vileplume','Paras','Parasect','Venonat',
      'Venomoth','Diglett','Dugtrio','Meowth','Persian','Psyduck',
      'Golduck','Mankey','Primeape','Growlithe','Arcanine','Poliwag',
      'Poliwhirl','Poliwrath','Abra','Kadabra','Alakazam','Machop',
      'Machoke','Machamp','Bellsprout','Weepinbell','Victreebel','Tentacool',
      'Tentacruel','Geodude','Graveler','Golem','Ponyta','Rapidash',
      'Slowpoke','Slowbro','Magnemite','Magneton',"Farfetch'd",'Doduo',
      'Dodrio','Seel','Dewgong','Grimer','Muk','Shellder',
      'Cloyster','Gastly','Haunter','Gengar','Onix','Drowzee',
      'Hypno','Krabby','Kingler','Voltorb','Electrode','Exeggcute',
      'Exeggutor','Cubone','Marowak','Hitmonlee','Hitmonchan','Lickitung',
      'Koffing','Weezing','Rhyhorn','Rhydon','Chansey','Tangela',
      'Kangaskhan','Horsea','Seadra','Goldeen','Seaking','Staryu',
      'Starmie','Mr. Mime','Scyther','Jynx','Electabuzz','Magmar',
      'Pinsir','Tauros','Magikarp','Gyarados','Lapras','Ditto',
      'Eevee','Vaporeon','Jolteon','Flareon','Porygon','Omanyte',
      'Omastar','Kabuto','Kabutops','Aerodactyl','Snorlax','Articuno',
      'Zapdos','Moltres','Dratini','Dragonair','Dragonite','Mewtwo','Mew'
    ]; // 151 Gen 1 Pokemon

    const SHEET_COLS = 20;
    const QUESTIONS_PER_GAME = 10;
    const TIME_LIMIT = 10;
    const DISPLAY_TARGET = 200; // target display width in px for each sprite

    let spriteW = 0, spriteH = 0;
    let displayW = 0, displayH = 0;
    let sheetDisplayW = 0, sheetDisplayH = 0;

    // Game state
    let questions = [];
    let currentQ = 0;
    let totalScore = 0;
    let questionScore = 100;
    let secondsElapsed = 0;
    let timerInterval = null;
    let answered = false;

    // ----- Sprite sheet loading -----
    const sheetImg = new Image();
    sheetImg.onload = function () {
      const sheetRows = Math.ceil(POKEMON.length / SHEET_COLS);
      spriteW = sheetImg.naturalWidth / SHEET_COLS;
      spriteH = sheetImg.naturalHeight / sheetRows;

      const scale = DISPLAY_TARGET / spriteW;
      displayW = Math.round(spriteW * scale);
      displayH = Math.round(spriteH * scale);
      sheetDisplayW = Math.round(sheetImg.naturalWidth * scale);
      sheetDisplayH = Math.round(sheetImg.naturalHeight * scale);

      const el = document.getElementById('sprite-display');
      el.style.width = displayW + 'px';
      el.style.height = displayH + 'px';
      el.style.backgroundSize = sheetDisplayW + 'px ' + sheetDisplayH + 'px';

      startGame();
    };
    sheetImg.src = '1.png';

    // ----- Game logic -----

    function startGame() {
      questions = generateQuestions(QUESTIONS_PER_GAME);
      currentQ = 0;
      totalScore = 0;
      showQuestion();
    }

    function generateQuestions(n) {
      const allIds = Array.from({ length: POKEMON.length }, (_, i) => i + 1);
      shuffle(allIds);
      const selected = allIds.slice(0, n);
      return selected.map(id => {
        const wrong = allIds.filter(x => x !== id);
        shuffle(wrong);
        const choices = shuffle([id, wrong[0], wrong[1]]);
        return { id, choices };
      });
    }

    function showQuestion() {
      const q = questions[currentQ];
      answered = false;
      secondsElapsed = 0;
      questionScore = 100;

      // Set sprite
      setSpritePosition(q.id);
      setReveal(0);

      // Reset choices
      const btns = document.querySelectorAll('.choice');
      btns.forEach((btn, i) => {
        const pokeId = q.choices[i];
        btn.textContent = POKEMON[pokeId - 1];
        btn.setAttribute('data-id', pokeId);
        btn.className = 'choice';
        btn.disabled = false;
      });

      // Reset main button
      const mainBtn = document.getElementById('main-btn');
      mainBtn.textContent = '0/10';
      mainBtn.disabled = true;
      mainBtn.onclick = null;

      document.getElementById('score-text').textContent = 'Score: 100p';

      // Start timer
      clearInterval(timerInterval);
      timerInterval = setInterval(tick, 1000);
    }

    function tick() {
      if (answered) return;
      secondsElapsed++;
      questionScore = Math.max(0, 100 - secondsElapsed * 10);

      setReveal(secondsElapsed / TIME_LIMIT);
      document.getElementById('main-btn').textContent = secondsElapsed + '/10';
      document.getElementById('score-text').textContent = 'Score: ' + questionScore + 'p';

      if (secondsElapsed >= TIME_LIMIT) {
        clearInterval(timerInterval);
        revealResult(null); // time ran out, no choice selected
      }
    }

    function setSpritePosition(pokemonId) {
      const col = (pokemonId - 1) % SHEET_COLS;
      const row = Math.floor((pokemonId - 1) / SHEET_COLS);
      const bgX = -(col * displayW);
      const bgY = -(row * displayH);
      const el = document.getElementById('sprite-display');
      el.style.backgroundPosition = bgX + 'px ' + bgY + 'px';
    }

    function setReveal(ratio) {
      // ratio: 0 = hidden, 1 = fully revealed
      const el = document.getElementById('sprite-display');
      if (ratio >= 1) {
        el.style.clipPath = 'none';
      } else {
        // Reveal from center outward
        const clampedRatio = Math.max(0.05, ratio); // always show a tiny sliver
        const clipPct = ((1 - clampedRatio) / 2 * 100).toFixed(2);
        el.style.clipPath = `inset(0 ${clipPct}% 0 ${clipPct}%)`;
      }
    }

    // Attach click handlers to choice buttons
    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', function () {
        if (answered) return;
        answered = true;
        clearInterval(timerInterval);
        const chosenId = parseInt(this.getAttribute('data-id'));
        revealResult(chosenId);
      });
    });

    function revealResult(chosenId) {
      answered = true;
      const q = questions[currentQ];
      const correctId = q.id;
      const isCorrect = chosenId === correctId;
      const earned = isCorrect ? questionScore : 0;
      totalScore += earned;

      // Fully reveal sprite
      setReveal(1);

      // Update score text to show what was earned this round
      document.getElementById('score-text').textContent = 'Score: ' + earned + 'p';

      // Update choice button states
      document.querySelectorAll('.choice').forEach(btn => {
        const btnId = parseInt(btn.getAttribute('data-id'));
        btn.disabled = true;
        if (btnId === correctId) {
          btn.classList.add('correct');
        } else if (chosenId !== null && btnId === chosenId) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('dim');
        }
      });

      // Switch main button to NEXT
      const mainBtn = document.getElementById('main-btn');
      mainBtn.textContent = 'NEXT';
      mainBtn.disabled = false;
      mainBtn.onclick = nextQuestion;
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showEndScreen();
      } else {
        showQuestion();
      }
    }

    function showEndScreen() {
      const maxScore = QUESTIONS_PER_GAME * 100;
      const pct = Math.round((totalScore / maxScore) * 100);

      document.getElementById('game').innerHTML = `
        <div id="end-screen">
          <h2>Who's that<br>pokemon?</h2>
          <p class="total-score">${totalScore}p</p>
          <p class="sub-score">out of ${maxScore}p &mdash; ${pct}%</p>
          <button id="main-btn" onclick="location.reload()">Play Again</button>
        </div>
      `;
    }

    // ----- Utilities -----

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
