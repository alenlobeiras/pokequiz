<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokequiz</title>
  <style>
    @font-face {
      font-family: 'Tamago';
      src: url('tamago.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Tamago', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    p,
    strong {
      font-weight: normal;
    }

    /* ── Generation selection screen ────────────────────────────────────────── */
    #gen-screen {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #gen-screen h1 {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
    }

    #gen-screen>p {
      font-size: 16px;
      color: #818181;
    }

    #gen-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .gen-btn {
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 16px;
      padding: 12px 8px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: opacity 0.2s ease-in-out;
    }

    .gen-btn:hover {
      opacity: 0.5;
    }

    .gen-btn.all {
      grid-column: 1 / -1;
      font-size: 16px;
      padding: 14px;
    }

    .gen-btn .gen-label {
      display: block;
      font-size: 13px;
      color: #818181;
      margin-top: 2px;
    }

    /* ── Difficulty screen ──────────────────────────────────────────────────── */
    #difficulty-screen {
      width: 474px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #difficulty-screen h1 {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
    }

    #diff-gen-label {
      font-size: 13px;
      color: #818181;
    }

    #diff-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
    }

    .diff-btn {
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      padding: 14px 12px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      line-height: 1.6;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }

    .diff-btn:hover:not(.selected) {
      opacity: 0.6;
    }

    .diff-btn.selected {
      background: #fff;
      color: #000;
    }

    .diff-btn .diff-name {
      display: block;
      font-size: 16px;
    }

    .diff-btn .diff-stats {
      display: block;
      font-size: 13px;
      margin-top: 4px;
      color: #818181;
    }

    #mode-toggle {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .mode-btn {
      flex: 1;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 16px;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      line-height: 1.5;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }

    .mode-btn .mode-sub {
      display: block;
      font-size: 13px;
      color: #818181;
      margin-top: 2px;
    }

    .mode-btn.selected {
      background: #fff;
      color: #000;
    }

    .mode-btn:hover:not(.selected) {
      opacity: 0.6;
    }

    #diff-record {
      font-size: 13px;
      color: #818181;
      text-align: center;
      min-height: 20px;
    }

    #diff-record span {
      opacity: 1;
      color: #fff;
    }

    #play-btn {
      background: #fff;
      color: #000;
      font-family: 'Tamago', monospace;
      font-size: 16px;
      padding: 14px 48px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #play-btn:hover {
      opacity: 0.7;
    }

    #diff-back {
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 13px;
      border: none;
      cursor: pointer;
      padding: 4px;
      transition: ease-in-out color 0.15s;
    }

    #diff-back:hover {
      color: #818181;
    }

    /* ── Loading screen ─────────────────────────────────────────────────────── */
    #loading-screen {
      display: none;
      text-align: center;
      font-size: 18px;
      line-height: 2;
    }

    #loading-screen p {
      opacity: 0.7;
      font-size: 13px;
    }

    /* ── Game screen ────────────────────────────────────────────────────────── */
    #game {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      display: none;
    }

    #title {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
      width: 100%;
    }

    #round-counter {
      font-size: 13px;
      opacity: 0.6;
      text-align: center;
    }

    #lives-display {
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      min-height: 28px;
    }

    #sprite-container {
      height: 300px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sprite-display {
      width: 300px;
      height: 300px;
      display: block;
      filter: grayscale(1);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #main-btn {
      background: transparent;
      color: #fff;
      width: auto;
      padding: 10px 24px;
      border-radius: 8px;
      text-align: center;
      font-size: 1rem;
      font-family: 'Tamago', monospace;
      border: 1px solid #fff;
      cursor: pointer;
      transition: opacity 0.2s ease-in-out;
    }

    #main-btn:hover:not(:disabled) {
      opacity: 0.5;
    }

    #main-btn:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #action-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #see-result-link {
      display: none;
      color: #fff;
      font-size: 14px;
      text-decoration: underline;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Tamago', monospace;
      padding: 4px;
      transition: opacity 0.2s;
    }

    #see-result-link:hover {
      opacity: 0.6;
    }

    #choices {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }

    .choice {
      flex: 1;
      border: none;
      background: #fff;
      color: #000;
      font-family: 'Tamago', monospace;
      font-size: 21px;
      padding: 10px 6px;
      border-radius: 4px;
      cursor: pointer;
      min-height: 35px;
      line-height: 1.3;
      transition: opacity 0.2s ease-in-out;
    }

    .choice:hover:not(:disabled) {
      opacity: 0.5;
    }

    .choice:disabled {
      cursor: default;
    }

    .choice.correct {
      background: #15d000 !important;
      color: #fff !important;
    }

    .choice.wrong {
      background: #ff3333 !important;
      color: #fff !important;
    }

    .choice.dim {
      opacity: 0.3;
    }

    #score-text {
      font-size: 16px;
      text-align: center;
      width: 100%;
    }

    /* ── End screen ─────────────────────────────────────────────────────────── */
    #end-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    #end-screen h2 {
      font-size: 24px;
      line-height: 1.8;
    }

    #end-screen .pts {
      font-size: 36px;
    }

    #end-screen .sub {
      font-size: 16px;
      opacity: 0.7;
    }

    #end-screen .new-record {
      font-size: 16px;
      color: #FFD700;
    }

    #end-screen #main-btn {
      width: auto;
      padding: 16px 32px;
    }
  </style>
</head>

<body>

  <!-- Generation selection screen -->
  <div id="gen-screen">
    <h1>Who's that pokemon?</h1>
    <p style="margin: 1rem; text-align: center;">Choose a generation</p>
    <div id="gen-grid">
      <button class="gen-btn" data-gen="1">Gen I<span class="gen-label">Kanto</span></button>
      <button class="gen-btn" data-gen="2">Gen II<span class="gen-label">Johto</span></button>
      <button class="gen-btn" data-gen="3">Gen III<span class="gen-label">Hoenn</span></button>
      <button class="gen-btn" data-gen="4">Gen IV<span class="gen-label">Sinnoh</span></button>
      <button class="gen-btn" data-gen="5">Gen V<span class="gen-label">Unova</span></button>
      <button class="gen-btn" data-gen="6">Gen VI<span class="gen-label">Kalos</span></button>
      <button class="gen-btn" data-gen="7">Gen VII<span class="gen-label">Alola</span></button>
      <button class="gen-btn" data-gen="8">Gen VIII<span class="gen-label">Galar</span></button>
      <button class="gen-btn" data-gen="9">Gen IX<span class="gen-label">Paldea</span></button>
      <button class="gen-btn all" data-gen="all">All generations</button>
    </div>
  </div>

  <!-- Difficulty screen -->
  <div id="difficulty-screen">
    <h1>Who's that pokemon?</h1>
    <p id="diff-gen-label"></p>
    <div id="mode-toggle">
      <button class="mode-btn selected" data-mode="classic">
        10 Rounds
        <span class="mode-sub">Cumulative score</span>
      </button>
      <button class="mode-btn" data-mode="infinite">
        Infinite
        <span class="mode-sub">Until you run out of lives</span>
      </button>
    </div>
    <div id="diff-grid">
      <button class="diff-btn" data-diff="easy">
        <span class="diff-name">Easy</span>
        <span class="diff-stats"></span>
      </button>
      <button class="diff-btn selected" data-diff="normal">
        <span class="diff-name">Normal</span>
        <span class="diff-stats"></span>
      </button>
      <button class="diff-btn" data-diff="hard">
        <span class="diff-name">Hard</span>
        <span class="diff-stats"></span>
      </button>
      <button class="diff-btn" data-diff="expert">
        <span class="diff-name">Expert</span>
        <span class="diff-stats"></span>
      </button>
    </div>
    <p id="diff-record">Record: —</p>
    <button id="play-btn">Play</button>
    <button id="diff-back">← Back</button>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div>Loading...</div>
    <p>Fetching Pokemon data</p>
  </div>

  <!-- Game screen -->
  <div id="game">
    <div class="back-button" onclick="goHome()"
      style="position: fixed; left: 1rem; top: 1rem; display: flex; align-items: center; gap: .5rem; cursor: pointer;">
      <span
        style="display: block; background: #fff; padding: .5rem; width: fit-content; height: fit-content; border-radius: 24px; line-height: 19px; color: #000; font-size: 1.5rem;">←</span>
      <span>Back to home</span>
    </div>
    <div id="round-counter"></div>
    <div id="lives-display"></div>
    <h1 id="title">Who's that pokemon?</h1>
    <div id="sprite-container">
      <canvas id="sprite-display" width="300" height="300"></canvas>
    </div>
    <div id="action-group">
      <button id="main-btn" disabled>Hints: 0/5</button>
      <button id="see-result-link">See result</button>
    </div>
    <div id="choices"></div>
    <p id="score-text">Score: 0p</p>
  </div>

  <script>
    // ── Special name mappings ──────────────────────────────────────────────────
    const SPECIAL_NAMES = {
      'nidoran-f': 'Nidoran\u2640', 'nidoran-m': 'Nidoran\u2642',
      'mr-mime': 'Mr. Mime', 'mr-rime': 'Mr. Rime',
      'mime-jr': 'Mime Jr.', 'farfetchd': "Farfetch'd",
      'sirfetchd': "Sirfetch'd", 'flabebe': 'Flab\u00e9b\u00e9',
      'type-null': 'Type: Null', 'porygon-z': 'Porygon-Z',
      'ho-oh': 'Ho-Oh', 'jangmo-o': 'Jangmo-o',
      'hakamo-o': 'Hakamo-o', 'kommo-o': 'Kommo-o',
      'tapu-koko': 'Tapu Koko', 'tapu-lele': 'Tapu Lele',
      'tapu-bulu': 'Tapu Bulu', 'tapu-fini': 'Tapu Fini',
      'chi-yu': 'Chi-Yu', 'chien-pao': 'Chien-Pao',
      'ting-lu': 'Ting-Lu', 'wo-chien': 'Wo-Chien',
      'great-tusk': 'Great Tusk', 'scream-tail': 'Scream Tail',
      'brute-bonnet': 'Brute Bonnet', 'flutter-mane': 'Flutter Mane',
      'slither-wing': 'Slither Wing', 'sandy-shocks': 'Sandy Shocks',
      'iron-treads': 'Iron Treads', 'iron-bundle': 'Iron Bundle',
      'iron-hands': 'Iron Hands', 'iron-jugulis': 'Iron Jugulis',
      'iron-moth': 'Iron Moth', 'iron-thorns': 'Iron Thorns',
      'roaring-moon': 'Roaring Moon', 'iron-valiant': 'Iron Valiant',
      'walking-wake': 'Walking Wake', 'iron-leaves': 'Iron Leaves',
      'gouging-fire': 'Gouging Fire', 'raging-bolt': 'Raging Bolt',
      'iron-boulder': 'Iron Boulder', 'iron-crown': 'Iron Crown',
    };

    function formatName(apiName) {
      if (SPECIAL_NAMES[apiName]) return SPECIAL_NAMES[apiName];
      return apiName.split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function spriteUrl(id) {
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    }

    // ── Difficulty config ──────────────────────────────────────────────────────
    const DIFFICULTIES = {
      easy: { label: 'Easy', choices: 2, maxHints: 5, pts: 50, hintPenalty: 5, evoTrap: 'never', lives: 3 },
      normal: { label: 'Normal', choices: 3, maxHints: 5, pts: 100, hintPenalty: 10, evoTrap: 'maybe', lives: 2 },
      hard: { label: 'Hard', choices: 3, maxHints: 3, pts: 150, hintPenalty: 30, evoTrap: 'always', lives: 2 },
      expert: { label: 'Expert', choices: 4, maxHints: 1, pts: 200, hintPenalty: 100, evoTrap: 'always', lives: 1 },
    };

    const QUESTIONS_N = 10;

    const GEN_LABELS = {
      '1': 'Gen I – Kanto', '2': 'Gen II – Johto', '3': 'Gen III – Hoenn',
      '4': 'Gen IV – Sinnoh', '5': 'Gen V – Unova', '6': 'Gen VI – Kalos',
      '7': 'Gen VII – Alola', '8': 'Gen VIII – Galar', '9': 'Gen IX – Paldea',
      'all': 'All Generations',
    };

    // ── App state ──────────────────────────────────────────────────────────────
    let pokemonPool = [];
    let pokemonPoolGen = null;
    let selectedGen = null;
    let selectedDifficulty = 'normal';
    let selectedMode = 'classic';
    let questions = [], currentQ = 0, totalScore = 0;
    let revealStep = 0, answered = false;
    let lives = 0, correctCount = 0;
    let evoMapCache = {};

    // ── Screen management ──────────────────────────────────────────────────────
    function showScreen(id) {
      ['gen-screen', 'difficulty-screen', 'loading-screen', 'game'].forEach(s => {
        const el = document.getElementById(s);
        if (s === id) {
          el.style.display = (s === 'game' || s === 'difficulty-screen') ? 'flex' : 'block';
        } else {
          el.style.display = 'none';
        }
      });
    }

    function goHome() {
      showScreen('gen-screen');
    }

    // ── LocalStorage records ───────────────────────────────────────────────────
    function getRecordKey() {
      return `pokequiz_${selectedGen}_${selectedDifficulty}_${selectedMode}`;
    }

    function getRecord() {
      const val = localStorage.getItem(getRecordKey());
      return val !== null ? parseInt(val) : null;
    }

    function saveRecord(score) {
      const prev = getRecord();
      if (prev === null || score > prev) {
        localStorage.setItem(getRecordKey(), score);
        return true;
      }
      return false;
    }

    function updateRecordDisplay() {
      const rec = getRecord();
      const el = document.getElementById('diff-record');
      if (rec === null) {
        el.textContent = 'Record: —';
        return;
      }
      const diff = DIFFICULTIES[selectedDifficulty];
      if (selectedMode === 'classic') {
        const maxPts = QUESTIONS_N * diff.pts;
        el.innerHTML = `Record: <span>${rec}p</span> of ${maxPts}p`;
      } else {
        el.innerHTML = `Record: <span>${rec} correct</span>`;
      }
    }

    function updateDifficultyStats() {
      document.querySelectorAll('.diff-btn').forEach(btn => {
        const diff = DIFFICULTIES[btn.getAttribute('data-diff')];
        const statsEl = btn.querySelector('.diff-stats');
        const hintsLabel = `${diff.maxHints} ${diff.maxHints === 1 ? 'hint' : 'hints'}`;
        const base = `${diff.choices} choices · ${hintsLabel}`;
        if (selectedMode === 'classic') {
          statsEl.textContent = `${base} · max ${QUESTIONS_N * diff.pts}p`;
        } else {
          const livesLabel = `${diff.lives} ${diff.lives === 1 ? 'life' : 'lives'}`;
          statsEl.textContent = `${base} · ${livesLabel}`;
        }
      });
    }

    // ── PokéAPI fetching ───────────────────────────────────────────────────────
    async function fetchPokemonForGen(genId) {
      if (genId === 'all') {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
        const data = await res.json();
        return data.results.map((p, i) => ({ id: i + 1, name: formatName(p.name) }));
      } else {
        const res = await fetch(`https://pokeapi.co/api/v2/generation/${genId}`);
        const data = await res.json();
        return data.pokemon_species
          .map(s => ({
            id: parseInt(s.url.split('/').filter(Boolean).pop()),
            name: formatName(s.name)
          }))
          .sort((a, b) => a.id - b.id);
      }
    }

    // ── Generation selection ───────────────────────────────────────────────────
    document.querySelectorAll('.gen-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedGen = btn.getAttribute('data-gen');
        document.getElementById('diff-gen-label').textContent = GEN_LABELS[selectedGen] || '';
        updateDifficultyStats();
        updateRecordDisplay();
        showScreen('difficulty-screen');
      });
    });

    // ── Difficulty screen interactions ─────────────────────────────────────────
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedDifficulty = btn.getAttribute('data-diff');
        updateRecordDisplay();
      });
    });

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMode = btn.getAttribute('data-mode');
        updateDifficultyStats();
        updateRecordDisplay();
      });
    });

    document.getElementById('diff-back').addEventListener('click', () => showScreen('gen-screen'));

    document.getElementById('play-btn').addEventListener('click', async () => {
      showScreen('loading-screen');
      try {
        if (!pokemonPool.length || pokemonPoolGen !== selectedGen) {
          pokemonPool = await fetchPokemonForGen(selectedGen === 'all' ? 'all' : parseInt(selectedGen));
          pokemonPoolGen = selectedGen;
          evoMapCache = {};
        }
        startGame();
      } catch (e) {
        showScreen('difficulty-screen');
        alert('Failed to load Pokemon data. Check your connection and try again.');
      }
    });

    // ── Sprite helpers ─────────────────────────────────────────────────────────
    let _spriteImg = null;
    let _pixelSize = 6;
    let _pixelAnimFrame = null;

    const PIXEL_STEPS = [6, 9, 13, 18, 24, 30];

    function getPixelSizeForStep(step) {
      return PIXEL_STEPS[Math.min(step, PIXEL_STEPS.length - 1)];
    }

    function drawPixelated(canvas, img, pixelSize) {
      if (!img || !img.naturalWidth || pixelSize < 1) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (pixelSize >= canvas.width) {
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return;
      }
      const off = document.createElement('canvas');
      off.width = pixelSize;
      off.height = pixelSize;
      const octx = off.getContext('2d');
      octx.imageSmoothingEnabled = true;
      octx.drawImage(img, 0, 0, pixelSize, pixelSize);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(off, 0, 0, pixelSize, pixelSize, 0, 0, canvas.width, canvas.height);
    }

    function drawPlaceholder(canvas) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#444';
      ctx.font = 'bold 160px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', canvas.width / 2, canvas.height / 2);
    }

    function animatePixelTo(canvas, img, targetSize, duration) {
      if (_pixelAnimFrame) { cancelAnimationFrame(_pixelAnimFrame); _pixelAnimFrame = null; }
      if (!img || !img.naturalWidth) return;
      const startSize = _pixelSize;
      if (startSize === targetSize) return;
      const startTime = performance.now();
      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const size = Math.max(1, Math.round(startSize + (targetSize - startSize) * eased));
        drawPixelated(canvas, img, size);
        _pixelSize = size;
        if (t < 1) {
          _pixelAnimFrame = requestAnimationFrame(step);
        } else {
          _pixelSize = targetSize;
          _pixelAnimFrame = null;
        }
      }
      _pixelAnimFrame = requestAnimationFrame(step);
    }

    function setSpriteForPokemon(id) {
      if (_pixelAnimFrame) { cancelAnimationFrame(_pixelAnimFrame); _pixelAnimFrame = null; }
      _spriteImg = null;
      const canvas = document.getElementById('sprite-display');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        if (!img.naturalWidth) { drawPlaceholder(canvas); return; }
        _spriteImg = img;
        if (answered) {
          canvas.style.filter = 'grayscale(0)';
          _pixelSize = canvas.width;
          drawPixelated(canvas, img, canvas.width);
        } else {
          drawPixelated(canvas, img, _pixelSize);
        }
      };
      img.onerror = () => {
        drawPlaceholder(canvas);
      };
      img.src = spriteUrl(id);
    }

    function setReveal(ratio) {
      const canvas = document.getElementById('sprite-display');
      if (ratio >= 1) {
        canvas.style.filter = 'grayscale(0)';
        if (_spriteImg) animatePixelTo(canvas, _spriteImg, 300, 600);
      } else if (ratio === 0) {
        _pixelSize = getPixelSizeForStep(0);
        if (_spriteImg) drawPixelated(canvas, _spriteImg, _pixelSize);
      } else {
        const step = Math.round(ratio * (PIXEL_STEPS.length - 1));
        const targetSize = getPixelSizeForStep(step);
        if (_spriteImg) animatePixelTo(canvas, _spriteImg, targetSize, 400);
      }
    }

    // ── Game logic ─────────────────────────────────────────────────────────────
    async function startGame() {
      const diff = DIFFICULTIES[selectedDifficulty];
      const pool = [...pokemonPool];
      shuffle(pool);

      // For classic: pick 10; for infinite: use the whole shuffled pool
      const selected = selectedMode === 'classic' ? pool.slice(0, QUESTIONS_N) : pool;

      // Pre-fetch evo data for classic (all 10), or first batch for infinite
      const toFetch = selectedMode === 'classic' ? selected : pool.slice(0, 40);
      const chainCache = {};

      await Promise.all(toFetch.map(async p => {
        if (evoMapCache[p.id] !== undefined) return;
        try {
          const specRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}`);
          const spec = await specRes.json();
          const chainUrl = spec.evolution_chain.url;
          if (!chainCache[chainUrl]) chainCache[chainUrl] = fetch(chainUrl).then(r => r.json());
          const chain = await chainCache[chainUrl];
          const ids = [];
          (function walk(node) {
            ids.push(parseInt(node.species.url.split('/').filter(Boolean).pop()));
            node.evolves_to.forEach(walk);
          }(chain.chain));
          evoMapCache[p.id] = ids.filter(id => id !== p.id && pokemonPool.some(pp => pp.id === id));
        } catch (_) {
          evoMapCache[p.id] = [];
        }
      }));

      questions = selected.map(p => ({ id: p.id, name: p.name, choices: null }));
      currentQ = 0;
      totalScore = 0;
      correctCount = 0;
      lives = diff.lives;

      showScreen('game');
      showQuestion();
    }

    function pickChoices(correct, evoRelatives = []) {
      const diff = DIFFICULTIES[selectedDifficulty];
      const numWrong = diff.choices - 1;
      const others = pokemonPool.filter(p => p.id !== correct.id);
      shuffle(others);

      const wrong = [];
      const usedIds = new Set([correct.id]);

      if (diff.evoTrap === 'always' && evoRelatives.length > 0) {
        const relatives = pokemonPool.filter(p => evoRelatives.includes(p.id));
        shuffle(relatives);
        for (const r of relatives) {
          if (wrong.length >= numWrong) break;
          if (!usedIds.has(r.id)) { wrong.push(r); usedIds.add(r.id); }
        }
      } else if (diff.evoTrap === 'maybe' && evoRelatives.length > 0 && Math.random() < 0.4) {
        const relative = pokemonPool.find(p => evoRelatives.includes(p.id));
        if (relative) { wrong.push(relative); usedIds.add(relative.id); }
      }

      for (const p of others) {
        if (wrong.length >= numWrong) break;
        if (!usedIds.has(p.id)) { wrong.push(p); usedIds.add(p.id); }
      }

      return shuffle([correct, ...wrong]);
    }

    function updateLivesDisplay() {
      const el = document.getElementById('lives-display');
      if (selectedMode !== 'infinite') { el.textContent = ''; return; }
      const maxLives = DIFFICULTIES[selectedDifficulty].lives;
      const lost = Math.max(0, maxLives - lives);
      el.textContent = '\u2764\uFE0F'.repeat(lives) + '\uD83D\uDC94'.repeat(lost);
    }

    function updateRoundCounter() {
      const el = document.getElementById('round-counter');
      if (selectedMode === 'classic') {
        el.textContent = `Round ${currentQ + 1} of ${questions.length}`;
      } else {
        el.textContent = `Correct: ${correctCount}`;
      }
    }

    function showQuestion() {
      const diff = DIFFICULTIES[selectedDifficulty];
      answered = false;
      revealStep = 0;

      if (!questions[currentQ].choices) {
        const p = questions[currentQ];
        questions[currentQ].choices = pickChoices(p, evoMapCache[p.id] || []);
      }

      const q = questions[currentQ];

      updateRoundCounter();
      updateLivesDisplay();
      setSpriteForPokemon(q.id);
      document.getElementById('sprite-display').style.filter = 'grayscale(1)';
      setReveal(0);

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      q.choices.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = p.name;
        btn.setAttribute('data-id', p.id);
        btn.addEventListener('click', function () {
          if (answered) return;
          answered = true;
          revealResult(parseInt(this.getAttribute('data-id')));
        });
        choicesEl.appendChild(btn);
      });

      const mb = document.getElementById('main-btn');
      mb.textContent = `Hints: 0/${diff.maxHints}`;
      mb.disabled = diff.maxHints === 0;
      mb.onclick = onRevealClick;

      document.getElementById('see-result-link').style.display = 'none';

      document.getElementById('score-text').textContent =
        `Score: ${totalScore}p  •  +${diff.pts}p if correct`;
    }

    function onRevealClick() {
      const diff = DIFFICULTIES[selectedDifficulty];
      if (answered || revealStep >= diff.maxHints) return;
      revealStep++;

      const canvas = document.getElementById('sprite-display');
      const targetSize = getPixelSizeForStep(revealStep);
      if (_spriteImg) animatePixelTo(canvas, _spriteImg, targetSize, 400);

      const mb = document.getElementById('main-btn');
      mb.textContent = `Hints: ${revealStep}/${diff.maxHints}`;
      mb.disabled = revealStep >= diff.maxHints;

      const available = Math.max(0, diff.pts - revealStep * diff.hintPenalty);
      document.getElementById('score-text').textContent =
        `Score: ${totalScore}p  •  +${available}p if correct`;
    }

    function revealResult(chosenId) {
      const diff = DIFFICULTIES[selectedDifficulty];
      answered = true;
      const q = questions[currentQ];
      const isCorrect = chosenId === q.id;
      const earned = isCorrect ? Math.max(0, diff.pts - revealStep * diff.hintPenalty) : 0;
      totalScore += earned;
      if (isCorrect) correctCount++;

      setReveal(1);
      const cry = new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${q.id}.ogg`);
      cry.volume = 0.05;
      cry.play().catch(() => { });

      if (selectedMode === 'infinite' && !isCorrect) {
        lives--;
        updateLivesDisplay();
      }

      document.getElementById('score-text').textContent = `Score: ${totalScore}p  (+${earned}p)`;

      document.querySelectorAll('.choice').forEach(btn => {
        const bid = parseInt(btn.getAttribute('data-id'));
        btn.disabled = true;
        if (bid === q.id) btn.classList.add('correct');
        else if (bid === chosenId) btn.classList.add('wrong');
        else btn.classList.add('dim');
      });

      const mb = document.getElementById('main-btn');
      mb.disabled = false;

      if (selectedMode === 'infinite' && lives <= 0) {
        mb.textContent = 'Play again';
        mb.onclick = playAgainSameSettings;
        const link = document.getElementById('see-result-link');
        link.style.display = 'block';
        link.onclick = showEndScreen;
      } else {
        mb.textContent = 'NEXT';
        mb.onclick = nextQuestion;
      }
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) showEndScreen();
      else showQuestion();
    }

    async function playAgainSameSettings() {
      showScreen('loading-screen');
      try {
        await startGame();
      } catch (e) {
        showScreen('difficulty-screen');
        alert('Failed to restart. Please try again.');
      }
    }

    function showEndScreen() {
      const diff = DIFFICULTIES[selectedDifficulty];
      const recordValue = selectedMode === 'classic' ? totalScore : correctCount;
      const isNewRecord = saveRecord(recordValue);

      let scoreDisplay, subDisplay;
      if (selectedMode === 'classic') {
        const max = QUESTIONS_N * diff.pts;
        const pct = Math.round(totalScore / max * 100);
        scoreDisplay = `${totalScore}p`;
        subDisplay = `of ${max}p &mdash; ${pct}%`;
      } else {
        scoreDisplay = `${correctCount}`;
        subDisplay = `correct &mdash; ${totalScore}p total`;
      }

      document.getElementById('game').innerHTML = `
        <div id="end-screen">
          <h2>Who's that<br>pokemon?</h2>
          <p class="pts">${scoreDisplay}</p>
          <p class="sub">${subDisplay}</p>
          ${isNewRecord ? '<p class="new-record">★ New record ★</p>' : ''}
          <button id="main-btn" onclick="location.reload()">Play Again</button>
        </div>`;
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    showScreen('gen-screen');
  </script>
