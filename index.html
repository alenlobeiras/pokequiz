<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokequiz</title>
  <style>
    @font-face {
      font-family: 'Tamago';
      src: url('tamago.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Tamago', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    h1, h2, h3, h4, h5, h6, p, strong {
      font-weight: normal;
    }

    /* ── Generation selection screen ──────────────────────────────────────────── */
    #gen-screen {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #gen-screen h1 {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
    }

    #gen-screen p {
      font-size: 14px;
      opacity: 0.7;
    }

    #gen-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .gen-btn {
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 13px;
      padding: 12px 8px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: background 0.1s;
    }

    .gen-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .gen-btn.all {
      grid-column: 1 / -1;
      font-size: 16px;
      padding: 14px;
      border-color: #fff;
    }

    .gen-btn .gen-label {
      display: block;
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
    }

    /* ── Loading screen ───────────────────────────────────────────────────────── */
    #loading-screen {
      display: none;
      text-align: center;
      font-size: 18px;
      line-height: 2;
    }

    #loading-screen p {
      opacity: 0.7;
      font-size: 13px;
    }

    /* ── Game screen ──────────────────────────────────────────────────────────── */
    #game {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      display: none;
    }

    #title {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
      width: 100%;
    }

    #round-counter {
      font-size: 13px;
      opacity: 0.6;
      text-align: center;
    }

    #sprite-container {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sprite-display {
      width: 300px;
      height: 300px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      filter: grayscale(1);
    }

    #main-btn {
      background: #fff;
      color: #000;
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 24px;
      font-family: 'Tamago', monospace;
      border: none;
      cursor: pointer;
      min-height: 60px;
    }

    #main-btn:hover:not(:disabled) {
      background: #ddd;
    }

    #main-btn:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #choices {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }

    .choice {
      flex: 1;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      min-height: 35px;
      line-height: 1.3;
    }

    .choice:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .choice:disabled {
      cursor: default;
    }

    .choice.correct {
      border: 2px solid #15d000 !important;
      color: #15d000 !important;
    }

    .choice.wrong {
      border: 2px solid #ff3333 !important;
      color: #ff3333 !important;
    }

    .choice.dim {
      opacity: 0.3;
    }

    #score-text {
      font-size: 14px;
      text-align: center;
      width: 100%;
    }

    /* ── End screen ───────────────────────────────────────────────────────────── */
    #end-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    #end-screen h2 {
      font-size: 24px;
      line-height: 1.8;
    }

    #end-screen .pts {
      font-size: 36px;
    }

    #end-screen .sub {
      font-size: 14px;
      opacity: 0.7;
    }

    #end-screen #main-btn {
      width: auto;
      padding: 16px 32px;
    }
  </style>
</head>

<body>

  <!-- Generation selection screen -->
  <div id="gen-screen">
    <h1>Who's that<br>pokemon?</h1>
    <p>Choose a generation</p>
    <div id="gen-grid">
      <button class="gen-btn" data-gen="1">Gen I<span class="gen-label">Kanto</span></button>
      <button class="gen-btn" data-gen="2">Gen II<span class="gen-label">Johto</span></button>
      <button class="gen-btn" data-gen="3">Gen III<span class="gen-label">Hoenn</span></button>
      <button class="gen-btn" data-gen="4">Gen IV<span class="gen-label">Sinnoh</span></button>
      <button class="gen-btn" data-gen="5">Gen V<span class="gen-label">Unova</span></button>
      <button class="gen-btn" data-gen="6">Gen VI<span class="gen-label">Kalos</span></button>
      <button class="gen-btn" data-gen="7">Gen VII<span class="gen-label">Alola</span></button>
      <button class="gen-btn" data-gen="8">Gen VIII<span class="gen-label">Galar</span></button>
      <button class="gen-btn" data-gen="9">Gen IX<span class="gen-label">Paldea</span></button>
      <button class="gen-btn all" data-gen="all">All generations</button>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div>Loading...</div>
    <p>Fetching Pokemon data</p>
  </div>

  <!-- Game screen -->
  <div id="game">
    <div id="round-counter">Round 1 / 10</div>
    <h1 id="title">Who's that pokemon?</h1>
    <div id="sprite-container">
      <img id="sprite-display" src="" alt="">
    </div>
    <button id="main-btn" disabled>0/10</button>
    <div id="choices">
      <button class="choice" data-id="0">-</button>
      <button class="choice" data-id="0">-</button>
      <button class="choice" data-id="0">-</button>
    </div>
    <p id="score-text">Score: 0p</p>
  </div>

  <script>
    // ── Special name mappings ──────────────────────────────────────────────────
    const SPECIAL_NAMES = {
      'nidoran-f': 'Nidoran\u2640', 'nidoran-m': 'Nidoran\u2642',
      'mr-mime': 'Mr. Mime', 'mr-rime': 'Mr. Rime',
      'mime-jr': 'Mime Jr.', 'farfetchd': "Farfetch'd",
      'sirfetchd': "Sirfetch'd", 'flabebe': 'Flab\u00e9b\u00e9',
      'type-null': 'Type: Null', 'porygon-z': 'Porygon-Z',
      'ho-oh': 'Ho-Oh', 'jangmo-o': 'Jangmo-o',
      'hakamo-o': 'Hakamo-o', 'kommo-o': 'Kommo-o',
      'tapu-koko': 'Tapu Koko', 'tapu-lele': 'Tapu Lele',
      'tapu-bulu': 'Tapu Bulu', 'tapu-fini': 'Tapu Fini',
      'chi-yu': 'Chi-Yu', 'chien-pao': 'Chien-Pao',
      'ting-lu': 'Ting-Lu', 'wo-chien': 'Wo-Chien',
      'great-tusk': 'Great Tusk', 'scream-tail': 'Scream Tail',
      'brute-bonnet': 'Brute Bonnet', 'flutter-mane': 'Flutter Mane',
      'slither-wing': 'Slither Wing', 'sandy-shocks': 'Sandy Shocks',
      'iron-treads': 'Iron Treads', 'iron-bundle': 'Iron Bundle',
      'iron-hands': 'Iron Hands', 'iron-jugulis': 'Iron Jugulis',
      'iron-moth': 'Iron Moth', 'iron-thorns': 'Iron Thorns',
      'roaring-moon': 'Roaring Moon', 'iron-valiant': 'Iron Valiant',
      'walking-wake': 'Walking Wake', 'iron-leaves': 'Iron Leaves',
      'gouging-fire': 'Gouging Fire', 'raging-bolt': 'Raging Bolt',
      'iron-boulder': 'Iron Boulder', 'iron-crown': 'Iron Crown',
    };

    function formatName(apiName) {
      if (SPECIAL_NAMES[apiName]) return SPECIAL_NAMES[apiName];
      return apiName.split('-')
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    function spriteUrl(id) {
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    }

    // ── Config ────────────────────────────────────────────────────────────────
    const QUESTIONS_N = 10;
    const MAX_REVEALS = 10;
    const PTS_PER_REVEAL = 20;
    const PTS_CORRECT_BONUS = 20;

    // ── Game state ────────────────────────────────────────────────────────────
    let pokemonPool = []; // [{id, name}]
    let questions = [], currentQ = 0, totalScore = 0;
    let revealStep = 0, questionScore = 100, answered = false;

    // ── Screen management ─────────────────────────────────────────────────────
    function showScreen(id) {
      ['gen-screen', 'loading-screen', 'game'].forEach(s => {
        document.getElementById(s).style.display = s === id ? (s === 'game' ? 'flex' : 'block') : 'none';
      });
    }

    // ── PokéAPI fetching ──────────────────────────────────────────────────────
    async function fetchPokemonForGen(genId) {
      if (genId === 'all') {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
        const data = await res.json();
        return data.results.map((p, i) => ({ id: i + 1, name: formatName(p.name) }));
      } else {
        const res = await fetch(`https://pokeapi.co/api/v2/generation/${genId}`);
        const data = await res.json();
        return data.pokemon_species
          .map(s => ({
            id: parseInt(s.url.split('/').filter(Boolean).pop()),
            name: formatName(s.name)
          }))
          .sort((a, b) => a.id - b.id);
      }
    }

    // ── Generation selection ──────────────────────────────────────────────────
    document.querySelectorAll('.gen-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const genId = btn.getAttribute('data-gen');
        showScreen('loading-screen');
        try {
          pokemonPool = await fetchPokemonForGen(genId === 'all' ? 'all' : parseInt(genId));
          startGame();
        } catch (e) {
          showScreen('gen-screen');
          alert('Failed to load Pokemon data. Check your connection and try again.');
        }
      });
    });

    // ── Sprite helpers ────────────────────────────────────────────────────────
    function setSpriteForPokemon(id) {
      const el = document.getElementById('sprite-display');
      el.src = spriteUrl(id);
    }

    function setReveal(ratio) {
      const el = document.getElementById('sprite-display');
      if (ratio >= 1) {
        el.style.clipPath = 'none';
        el.style.filter = 'grayscale(0)';
      } else {
        const effective = Math.max(0.04, ratio);
        const clip = ((1 - effective) / 2 * 100).toFixed(1);
        el.style.clipPath = `inset(0 ${clip}% 0 ${clip}%)`;
      }
    }

    // ── Game logic ────────────────────────────────────────────────────────────
    function startGame() {
      questions = generateQuestions(QUESTIONS_N);
      currentQ = 0;
      totalScore = 0;
      showScreen('game');
      showQuestion();
    }

    function generateQuestions(n) {
      const pool = [...pokemonPool];
      shuffle(pool);
      return pool.slice(0, n).map(p => ({ id: p.id, name: p.name, choices: pickChoices(p) }));
    }

    function pickChoices(correct) {
      const others = pokemonPool.filter(p => p.id !== correct.id);
      shuffle(others);
      return shuffle([correct, others[0], others[1]]);
    }

    function updateRoundCounter() {
      const remaining = questions.length - currentQ;
      document.getElementById('round-counter').textContent =
        `Round ${currentQ + 1} / ${questions.length} — ${remaining - 1 === 0 ? 'last one!' : (remaining - 1) + ' left after this'}`;
    }

    function showQuestion() {
      const q = questions[currentQ];
      answered = false; revealStep = 0; questionScore = 100;

      updateRoundCounter();
      setSpriteForPokemon(q.id);
      document.getElementById('sprite-display').style.filter = 'grayscale(1)';
      setReveal(0);

      document.querySelectorAll('.choice').forEach((btn, i) => {
        const p = q.choices[i];
        btn.textContent = p.name;
        btn.setAttribute('data-id', p.id);
        btn.className = 'choice';
        btn.disabled = false;
      });

      const mb = document.getElementById('main-btn');
      mb.textContent = '0/10';
      mb.disabled = false;
      mb.onclick = onRevealClick;

      document.getElementById('score-text').textContent = 'Score: ' + totalScore + 'p';
    }

    function onRevealClick() {
      if (answered) return;
      revealStep++;
      questionScore = Math.max(0, 100 - revealStep * PTS_PER_REVEAL);
      setReveal(revealStep / MAX_REVEALS);

      const mb = document.getElementById('main-btn');
      if (revealStep >= MAX_REVEALS) {
        mb.textContent = '10/10';
        mb.disabled = true;
        revealResult(null);
      } else {
        mb.textContent = revealStep + '/10';
      }
      document.getElementById('score-text').textContent =
        'Score: ' + totalScore + 'p  (+' + questionScore + 'p available)';
    }

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', function () {
        if (answered) return;
        answered = true;
        revealResult(parseInt(this.getAttribute('data-id')));
      });
    });

    function revealResult(chosenId) {
      answered = true;
      const q = questions[currentQ];
      const isCorrect = chosenId === q.id;
      const earned = isCorrect ? questionScore + PTS_CORRECT_BONUS : 0;
      totalScore += earned;

      setReveal(1);
      document.getElementById('score-text').textContent = 'Score: ' + totalScore + 'p  (+' + earned + 'p)';

      document.querySelectorAll('.choice').forEach(btn => {
        const bid = parseInt(btn.getAttribute('data-id'));
        btn.disabled = true;
        if (bid === q.id) btn.classList.add('correct');
        else if (chosenId && bid === chosenId) btn.classList.add('wrong');
        else btn.classList.add('dim');
      });

      const mb = document.getElementById('main-btn');
      mb.textContent = 'NEXT';
      mb.disabled = false;
      mb.onclick = nextQuestion;
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) showEndScreen();
      else showQuestion();
    }

    function showEndScreen() {
      const max = QUESTIONS_N * (100 + PTS_CORRECT_BONUS);
      const pct = Math.round(totalScore / max * 100);
      document.getElementById('game').innerHTML = `
        <div id="end-screen">
          <h2>Who's that<br>pokemon?</h2>
          <p class="pts">${totalScore}p</p>
          <p class="sub">out of ${max}p &mdash; ${pct}%</p>
          <button id="main-btn" onclick="location.reload()">Play Again</button>
        </div>`;
    }

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Start at gen selection
    showScreen('gen-screen');
  </script>
</body>

</html>
