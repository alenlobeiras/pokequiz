<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokequiz</title>
  <style>
    @font-face {
      font-family: 'Tamago';
      src: url('tamago.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Tamago', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #game {
      width: 474px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #title {
      font-size: 24px;
      text-align: center;
      line-height: 1.6;
      width: 100%;
    }

    #sprite-container {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sprite-display {
      width: 300px;
      height: 300px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      filter: grayscale(1);
    }

    #main-btn {
      background: #fff;
      color: #000;
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 24px;
      font-family: 'Tamago', monospace;
      border: none;
      cursor: pointer;
      min-height: 60px;
    }

    #main-btn:hover:not(:disabled) { background: #ddd; }
    #main-btn:disabled { cursor: default; opacity: 0.5; }

    #choices {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }

    .choice {
      flex: 1;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-family: 'Tamago', monospace;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      min-height: 35px;
      line-height: 1.3;
    }

    .choice:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
    .choice:disabled { cursor: default; }
    .choice.correct { border: 2px solid #15d000 !important; color: #15d000 !important; }
    .choice.wrong   { border: 2px solid #ff3333 !important; color: #ff3333 !important; }
    .choice.dim     { opacity: 0.3; }

    #score-text { font-size: 14px; text-align: center; width: 100%; }

    #end-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    #end-screen h2   { font-size: 24px; line-height: 1.8; }
    #end-screen .pts { font-size: 36px; }
    #end-screen .sub { font-size: 14px; opacity: 0.7; }
    #end-screen #main-btn { width: auto; padding: 16px 32px; }
  </style>
</head>
<body>
<div id="game">
  <h1 id="title">Who's that pokemon?</h1>
  <div id="sprite-container">
    <img id="sprite-display" src="" alt="">
  </div>
  <button id="main-btn" disabled>0/10</button>
  <div id="choices">
    <button class="choice" data-id="0">-</button>
    <button class="choice" data-id="0">-</button>
    <button class="choice" data-id="0">-</button>
  </div>
  <p id="score-text">Score: 100p</p>
</div>

<script>
// Sprite URL por ID de Pokedex — garantiza que el sprite mostrado
// siempre corresponde exactamente al pokemon de la pregunta.
function spriteUrl(id) {
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
}

// ── Pokemon names ─────────────────────────────────────────────────────────────
const POKEMON = [
  'Bulbasaur','Ivysaur','Venusaur','Charmander','Charmeleon','Charizard',
  'Squirtle','Wartortle','Blastoise','Caterpie','Metapod','Butterfree',
  'Weedle','Kakuna','Beedrill','Pidgey','Pidgeotto','Pidgeot',
  'Rattata','Raticate','Spearow','Fearow','Ekans','Arbok',
  'Pikachu','Raichu','Sandshrew','Sandslash','Nidoran F','Nidorina',
  'Nidoqueen','Nidoran M','Nidorino','Nidoking','Clefairy','Clefable',
  'Vulpix','Ninetales','Jigglypuff','Wigglytuff','Zubat','Golbat',
  'Oddish','Gloom','Vileplume','Paras','Parasect','Venonat',
  'Venomoth','Diglett','Dugtrio','Meowth','Persian','Psyduck',
  'Golduck','Mankey','Primeape','Growlithe','Arcanine','Poliwag',
  'Poliwhirl','Poliwrath','Abra','Kadabra','Alakazam','Machop',
  'Machoke','Machamp','Bellsprout','Weepinbell','Victreebel','Tentacool',
  'Tentacruel','Geodude','Graveler','Golem','Ponyta','Rapidash',
  'Slowpoke','Slowbro','Magnemite','Magneton',"Farfetch'd",'Doduo',
  'Dodrio','Seel','Dewgong','Grimer','Muk','Shellder',
  'Cloyster','Gastly','Haunter','Gengar','Onix','Drowzee',
  'Hypno','Krabby','Kingler','Voltorb','Electrode','Exeggcute',
  'Exeggutor','Cubone','Marowak','Hitmonlee','Hitmonchan','Lickitung',
  'Koffing','Weezing','Rhyhorn','Rhydon','Chansey','Tangela',
  'Kangaskhan','Horsea','Seadra','Goldeen','Seaking','Staryu',
  'Starmie','Mr. Mime','Scyther','Jynx','Electabuzz','Magmar',
  'Pinsir','Tauros','Magikarp','Gyarados','Lapras','Ditto',
  'Eevee','Vaporeon','Jolteon','Flareon','Porygon','Omanyte',
  'Omastar','Kabuto','Kabutops','Aerodactyl','Snorlax','Articuno',
  'Zapdos','Moltres','Dratini','Dragonair','Dragonite','Mewtwo','Mew'
];

// Color groups for chromatic wrong-answer selection
// 0=fire/orange  1=water/blue  2=grass/green  3=yellow/electric
// 4=pink/normal  5=purple/dark  6=gray/brown
const COLOR_GROUP = [
  2,2,2,0,0,0,1,1,1,2,2,4,6,3,3,6,6,6,5,6,
  6,6,5,5,3,0,3,6,5,5,5,5,5,5,4,4,0,4,4,4,
  5,5,1,1,0,0,0,5,5,6,6,4,4,3,1,4,4,0,0,1,
  1,1,3,3,3,6,6,6,2,2,2,1,1,6,6,6,0,4,4,4,
  6,6,6,6,6,4,4,5,5,5,6,5,5,5,6,6,3,0,0,0,
  0,4,2,6,6,6,6,4,5,5,6,6,4,2,6,1,1,0,0,6,
  5,4,2,5,3,0,6,6,0,1,1,5,6,1,3,0,4,1,1,6,
  6,6,1,1,3,0,1,1,0,5,4
];

// ── Config ────────────────────────────────────────────────────────────────────
const QUESTIONS_N    = 10;
const MAX_REVEALS    = 10;
const PTS_PER_REVEAL  = 20;   // -20p per hint click
const PTS_CORRECT_BONUS = 20; // +20p bonus for answering correctly

// ── Game state ────────────────────────────────────────────────────────────────
let questions = [], currentQ = 0, totalScore = 0;
let revealStep = 0, questionScore = 100, answered = false;

// ── Sprite helpers ────────────────────────────────────────────────────────────
function setSpriteForPokemon(id) {
  const el = document.getElementById('sprite-display');
  el.src = spriteUrl(id);
}

// ratio 0 = hidden (thin sliver), 1 = fully revealed
function setReveal(ratio) {
  const el = document.getElementById('sprite-display');
  if (ratio >= 1) {
    el.style.clipPath = 'none';
    el.style.filter = 'grayscale(0)';
  } else {
    const effective = Math.max(0.04, ratio);
    const clip = ((1 - effective) / 2 * 100).toFixed(1);
    el.style.clipPath = `inset(0 ${clip}% 0 ${clip}%)`;
  }
}

// ── Game logic ────────────────────────────────────────────────────────────────
function startGame() {
  questions  = generateQuestions(QUESTIONS_N);
  currentQ   = 0;
  totalScore = 0;
  showQuestion();
}

function generateQuestions(n) {
  const ids = Array.from({ length: POKEMON.length }, (_, i) => i + 1);
  shuffle(ids);
  return ids.slice(0, n).map(id => ({ id, choices: pickChoices(id) }));
}

function pickChoices(correctId) {
  const g = COLOR_GROUP[correctId - 1];
  const same = [], other = [];
  for (let i = 1; i <= POKEMON.length; i++) {
    if (i === correctId) continue;
    (COLOR_GROUP[i - 1] === g ? same : other).push(i);
  }
  shuffle(same); shuffle(other);
  const pool = same.length >= 2 ? same : [...same, ...other];
  return shuffle([correctId, pool[0], pool[1]]);
}

function showQuestion() {
  const q = questions[currentQ];
  answered = false; revealStep = 0; questionScore = 100;

  setSpriteForPokemon(q.id);
  document.getElementById('sprite-display').style.filter = 'grayscale(1)';
  setReveal(0);

  document.querySelectorAll('.choice').forEach((btn, i) => {
    const pid = q.choices[i];
    btn.textContent = POKEMON[pid - 1];
    btn.setAttribute('data-id', pid);
    btn.className = 'choice';
    btn.disabled  = false;
  });

  const mb = document.getElementById('main-btn');
  mb.textContent = '0/10';
  mb.disabled    = false;
  mb.onclick     = onRevealClick;

  document.getElementById('score-text').textContent = 'Score: ' + totalScore + 'p';
}

function onRevealClick() {
  if (answered) return;
  revealStep++;
  questionScore = Math.max(0, 100 - revealStep * PTS_PER_REVEAL);
  setReveal(revealStep / MAX_REVEALS);

  const mb = document.getElementById('main-btn');
  if (revealStep >= MAX_REVEALS) {
    mb.textContent = '10/10';
    mb.disabled    = true;
    revealResult(null);
  } else {
    mb.textContent = revealStep + '/10';
  }
  document.getElementById('score-text').textContent = 'Score: ' + totalScore + 'p  (+' + questionScore + 'p available)';
}

document.querySelectorAll('.choice').forEach(btn => {
  btn.addEventListener('click', function () {
    if (answered) return;
    answered = true;
    revealResult(parseInt(this.getAttribute('data-id')));
  });
});

function revealResult(chosenId) {
  answered = true;
  const correctId  = questions[currentQ].id;
  const isCorrect  = chosenId === correctId;
  const earned     = isCorrect ? questionScore + PTS_CORRECT_BONUS : 0;
  totalScore      += earned;

  setReveal(1);
  document.getElementById('score-text').textContent = 'Score: ' + totalScore + 'p  (+' + earned + 'p)';

  document.querySelectorAll('.choice').forEach(btn => {
    const bid = parseInt(btn.getAttribute('data-id'));
    btn.disabled = true;
    if (bid === correctId)                  btn.classList.add('correct');
    else if (chosenId && bid === chosenId)  btn.classList.add('wrong');
    else                                    btn.classList.add('dim');
  });

  const mb = document.getElementById('main-btn');
  mb.textContent = 'NEXT';
  mb.disabled    = false;
  mb.onclick     = nextQuestion;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showEndScreen();
  else showQuestion();
}

function showEndScreen() {
  const max = QUESTIONS_N * (100 + PTS_CORRECT_BONUS); // 1200p max
  const pct = Math.round(totalScore / max * 100);
  document.getElementById('game').innerHTML = `
    <div id="end-screen">
      <h2>Who's that<br>pokemon?</h2>
      <p class="pts">${totalScore}p</p>
      <p class="sub">out of ${max}p &mdash; ${pct}%</p>
      <button id="main-btn" onclick="location.reload()">Play Again</button>
    </div>`;
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Start once page loads
window.addEventListener('load', startGame);
</script>
</body>
</html>
